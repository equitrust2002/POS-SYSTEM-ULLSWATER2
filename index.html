<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OmniPOS Apex v9.0 Quantum</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000; --surface: #1c1c1e; --accent: #ff9500; --text: #fff; 
            --text-dim: #8e8e93; --border: #38383a; --danger: #ff453a;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Navigation */
        .sidebar { width: 70px; background: var(--surface); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; border-right: 1px solid var(--border); }
        .nav-icon { color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 12px; border-radius: 14px; transition: 0.2s; }
        .nav-icon.active { color: var(--accent); background: rgba(255,149,0,0.15); }

        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
        .viewport { display: none; flex-direction: column; height: 100%; }
        .viewport.active { display: flex; }
        
        .top-bar { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(28,28,30,0.8); backdrop-filter: blur(10px); }

        /* Inventory Grid */
        .inventory-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; padding: 15px; }
        .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.1s; }
        .item-card:active { transform: scale(0.95); }
        .item-card img { width: 100%; height: 85px; object-fit: cover; }
        
        /* Tables */
        .table-scroll { flex: 1; overflow: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 13px; }
        th { color: var(--accent); text-align: left; padding: 12px; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg); }
        td { padding: 8px; border-bottom: 1px solid var(--border); }
        .edit-input { background: transparent; border: 1px solid transparent; color: #fff; width: 90%; padding: 6px; border-radius: 4px; }
        .edit-input:focus { border-color: var(--accent); background: #2c2c2e; outline: none; }

        /* Cart & Panel */
        .cart-panel { width: 360px; background: var(--surface); display: flex; flex-direction: column; border-left: 1px solid var(--border); }
        .cart-list { flex: 1; overflow-y: auto; padding: 15px; }
        .checkout-box { padding: 15px; border-top: 1px solid var(--border); background: var(--bg); }
        
        .btn-main { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; }
        
        /* Floating Scanner Button */
        #floating-scan { position: fixed; bottom: 30px; right: 380px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 99; cursor: pointer; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-body { background: var(--surface); padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid var(--border); overflow-y: auto; max-height: 90vh; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; }
        .input-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; }

        @media print {
            body * { visibility: hidden; }
            #receipt-p, #receipt-p * { visibility: visible; }
            #receipt-p { position: absolute; left: 0; top: 0; width: 100%; display: block !important; color: #000; background: #fff; font-family: 'Courier New', monospace; padding: 10px; }
        }
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="nav-icon active" onclick="showTab('tab-pos', this)">🛒</div>
    <div class="nav-icon" onclick="showTab('tab-inv', this)">📊</div>
    <div class="nav-icon" onclick="showTab('tab-logs', this)">📜</div>
    <div class="nav-icon" onclick="toggleSettings()">⚙️</div>
</nav>

<div class="main-content">
    <div id="tab-pos" class="viewport active">
        <div class="top-bar">
            <h2 id="h-store" style="color:var(--accent); margin:0; font-size: 18px;">QUANTUM POS</h2>
            <button onclick="openItemModal()" style="background:var(--accent); color:#000; border:none; padding:8px 12px; border-radius:10px; font-weight:bold;">+ ADD ITEM</button>
        </div>
        <div id="reg-scanner-ui" style="width:100%; height: 250px; display:none; background:#000; position:relative;">
            <div id="ticker-reader" style="width:100%; height:100%;"></div>
            <button onclick="stopTickerScan()" style="position:absolute; top:10px; right:10px; background:var(--danger); border:none; color:#fff; padding:5px 10px; border-radius:5px;">CLOSE SCANNER</button>
        </div>
        <div class="inventory-grid" id="posGrid"></div>
    </div>

    <div id="tab-inv" class="viewport">
        <div class="top-bar">
            <h2>Inventory</h2>
            <div style="display:flex; gap:8px;">
                <button onclick="exportFullCSV()" style="background:var(--surface); border:1px solid var(--border); color:#fff; padding:8px 12px; border-radius:8px; font-size:12px;">Export</button>
                <button onclick="document.getElementById('csvImp').click()" style="background:var(--accent); color:#000; border:none; padding:8px 12px; border-radius:8px; font-size:12px;">Import</button>
                <input type="file" id="csvImp" style="display:none" accept=".csv" onchange="importFullCSV(event)">
            </div>
        </div>
        <div class="table-scroll">
            <table>
                <thead><tr><th>Img</th><th>Barcode</th><th>Name</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
                <tbody id="invTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-logs" class="viewport">
        <div class="top-bar"><h2>Sales Log</h2><button onclick="exportLogs()" style="background:var(--accent); color:#000; border:none; padding:8px; border-radius:8px;">Export Logs</button></div>
        <div class="table-scroll">
            <table id="logsTable">
                <thead><tr style="color:var(--accent)"><th>Date</th><th>Ref</th><th>Customer</th><th>Total</th></tr></thead>
                <tbody id="logsTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="floating-scan" onclick="startTickerScan()">📷</div>

<div class="cart-panel">
    <div style="padding:15px; font-weight:bold; color:var(--accent); letter-spacing:1px;">CURRENT TICKET</div>
    <div class="cart-list" id="cartItems"></div>
    <div class="checkout-box">
        <div class="input-group"><label>Customer Name</label><input type="text" id="custName"></div>
        <div class="input-group"><label>Reference Code</label><input type="text" id="custRef"></div>
        <div style="display:flex; justify-content:space-between; font-size:24px; font-weight:900; margin:10px 0;">
            <span style="color:var(--text-dim);">TOTAL</span><span id="grandTotal" style="color:var(--accent);">₱0.00</span>
        </div>
        <button class="btn-main" onclick="processSale()">CHARGE & PRINT</button>
        <button onclick="voidTicket()" style="width:100%; background:none; border:none; color:var(--danger); margin-top:10px; font-size:12px; font-weight:bold; cursor:pointer;">VOID TRANSACTION</button>
    </div>
</div>

<div class="modal" id="itemModal">
    <div class="modal-body">
        <h3 style="color:var(--accent); margin-top:0;">Add New Product</h3>
        <div id="setup-scanner-ui" style="width:100%; height: 200px; display:none; margin-bottom:15px; border-radius:10px; overflow:hidden;"></div>
        <div class="input-group">
            <label>Barcode</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="m-code" style="flex:1;">
                <button onclick="startSetupScan()" style="background:var(--accent); border:none; border-radius:8px; padding:0 12px;">📷</button>
            </div>
        </div>
        <div class="input-group"><label>Item Name</label><input type="text" id="m-name"></div>
        <div class="input-group"><label>Price (₱)</label><input type="number" id="m-price"></div>
        <div class="input-group"><label>Initial Stock</label><input type="number" id="m-stock"></div>
        <div class="input-group"><label>Product Image</label><input type="file" id="m-img" accept="image/*"></div>
        <button onclick="saveItem()" class="btn-main">SAVE TO INVENTORY</button>
        <button onclick="closeModals()" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px;">CANCEL</button>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-body">
        <h3 style="color:var(--accent);">Receipt Configuration</h3>
        <div class="input-group"><label>Store Name</label><input type="text" id="s-name"></div>
        <div class="input-group"><label>Sub-header</label><input type="text" id="s-sub"></div>
        <div class="input-group"><label>Footnote</label><input type="text" id="s-foot"></div>
        <button onclick="saveSettings()" class="btn-main">SAVE CONFIG</button>
    </div>
</div>

<div id="receipt-p" style="display:none; text-align:center;">
    <h2 id="r-name"></h2><p id="r-sub"></p>
    <p>----------------------------</p>
    <div style="text-align:left;">
        <p>INV: <span id="r-inv"></span></p>
        <p>DATE: <span id="r-date"></span></p>
        <p id="r-cust"></p>
    </div>
    <p>----------------------------</p>
    <div id="r-items" style="text-align:left;"></div>
    <p>----------------------------</p>
    <div style="display:flex; justify-content:space-between; font-weight:bold;"><span>TOTAL</span><span id="r-total"></span></div>
    <p id="r-foot" style="margin-top:20px; font-size:10px;"></p>
</div>

<script>
    let inventory = JSON.parse(localStorage.getItem('apex_v9_inv')) || [];
    let salesLogs = JSON.parse(localStorage.getItem('apex_v9_logs')) || [];
    let cart = [];
    let config = JSON.parse(localStorage.getItem('apex_v9_cfg')) || { name: "Apex Quantum", sub: "Titan District, PH", foot: "Premium Goods", ref: 10001 };
    let activeScanner = null;

    function showTab(id, el) {
        document.querySelectorAll('.viewport').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-icon').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'tab-inv') renderTable();
        if(id === 'tab-pos') renderGrid();
        if(id === 'tab-logs') renderLogs();
    }

    // --- SCANNER SYSTEM ---
    async function startSetupScan() {
        const div = document.getElementById('setup-scanner-ui');
        div.style.display = 'block';
        activeScanner = new Html5Qrcode("setup-scanner-ui");
        await activeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decoded) => {
            document.getElementById('m-code').value = decoded;
            stopScanner('setup-scanner-ui');
        });
    }

    async function startTickerScan() {
        const div = document.getElementById('reg-scanner-ui');
        div.style.display = 'block';
        activeScanner = new Html5Qrcode("ticker-reader");
        await activeScanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (decoded) => {
            const idx = inventory.findIndex(i => i.code === decoded);
            if(idx > -1) {
                addToCart(idx);
                // Vibrational feedback for iPhone/Android
                if(navigator.vibrate) navigator.vibrate(100);
            }
        });
    }

    function stopTickerScan() { stopScanner('reg-scanner-ui'); }

    function stopScanner(divId) {
        if(activeScanner) {
            activeScanner.stop().then(() => {
                document.getElementById(divId).style.display = 'none';
                activeScanner = null;
            });
        }
    }

    // --- INVENTORY ENGINE ---
    function renderTable() {
        const body = document.getElementById('invTableBody');
        body.innerHTML = inventory.map((i, idx) => `
            <tr>
                <td><img src="${i.img || ''}" style="width:30px; height:30px; border-radius:4px;" onclick="changeImg(${idx})"></td>
                <td><input class="edit-input" value="${i.code}" onchange="updateVal(${idx}, 'code', this.value)"></td>
                <td><input class="edit-input" value="${i.name}" onchange="updateVal(${idx}, 'name', this.value)"></td>
                <td><input class="edit-input" type="number" value="${i.price}" onchange="updateVal(${idx}, 'price', this.value)"></td>
                <td><input class="edit-input" type="number" value="${i.stock}" onchange="updateVal(${idx}, 'stock', this.value)"></td>
                <td><button onclick="inventory.splice(${idx},1); renderTable();" style="color:var(--danger); border:none; background:none;">✕</button></td>
            </tr>
        `).join('');
        localStorage.setItem('apex_v9_inv', JSON.stringify(inventory));
    }

    function updateVal(idx, k, v) { inventory[idx][k] = (k==='price'||k==='stock')? parseFloat(v) : v; localStorage.setItem('apex_v9_inv', JSON.stringify(inventory)); }

    function changeImg(idx) {
        const input = document.createElement('input'); input.type = 'file';
        input.onchange = (e) => {
            const r = new FileReader(); r.onload = (f) => { inventory[idx].img = f.target.result; renderTable(); }; r.readAsDataURL(e.target.files[0]);
        };
        input.click();
    }

    // --- POS ENGINE ---
    function renderGrid() {
        document.getElementById('posGrid').innerHTML = inventory.map((i, idx) => `
            <div class="item-card" onclick="addToCart(${idx})">
                <img src="${i.img || 'https://via.placeholder.com/100'}">
                <div style="padding:8px;">
                    <div style="font-size:11px; font-weight:bold;">${i.name}</div>
                    <div style="color:var(--accent); font-weight:800;">₱${parseFloat(i.price).toFixed(2)}</div>
                </div>
            </div>
        `).join('');
        document.getElementById('h-store').innerText = config.name;
    }

    function addToCart(idx) {
        const item = inventory[idx];
        if(item.stock <= 0) return;
        const exist = cart.find(c => c.code === item.code);
        if(exist) exist.qty++; else cart.push({...item, qty: 1, invIdx: idx});
        updateCart();
    }

    function updateCart() {
        let total = 0;
        document.getElementById('cartItems').innerHTML = cart.map((i, idx) => {
            total += (i.price * i.qty);
            return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;">
                <div><strong>${i.name}</strong><br><small>₱${i.price} x ${i.qty}</small></div>
                <div style="text-align:right">₱${(i.price * i.qty).toFixed(2)}<br><span onclick="cart.splice(${idx},1); updateCart();" style="color:var(--danger); font-size:10px; cursor:pointer;">Void</span></div>
            </div>`;
        }).join('');
        document.getElementById('grandTotal').innerText = "₱" + total.toLocaleString();
    }

    function voidTicket() { if(confirm("Void current ticket?")) { cart = []; updateCart(); } }

    function processSale() {
        if(cart.length === 0) return;
        const total = document.getElementById('grandTotal').innerText;
        const date = new Date().toLocaleString();
        const invNum = config.ref++;
        
        salesLogs.unshift({ date, ref: invNum, cust: document.getElementById('custName').value, total });
        localStorage.setItem('apex_v9_logs', JSON.stringify(salesLogs));

        cart.forEach(c => inventory[c.invIdx].stock -= c.qty);
        localStorage.setItem('apex_v9_inv', JSON.stringify(inventory));

        document.getElementById('r-name').innerText = config.name;
        document.getElementById('r-sub').innerText = config.sub;
        document.getElementById('r-inv').innerText = invNum;
        document.getElementById('r-date').innerText = date;
        document.getElementById('r-cust').innerText = "CLIENT: " + (document.getElementById('custName').value || "Walk-in");
        document.getElementById('r-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between"><span>${i.qty}x ${i.name}</span><span>₱${(i.qty*i.price).toFixed(2)}</span></div>`).join('');
        document.getElementById('r-total').innerText = total;
        document.getElementById('r-foot').innerText = config.foot;

        window.print();
        cart = []; updateCart(); renderGrid();
        localStorage.setItem('apex_v9_cfg', JSON.stringify(config));
    }

    function renderLogs() {
        document.getElementById('logsTableBody').innerHTML = salesLogs.map(l => `<tr><td>${l.date}</td><td>${l.ref}</td><td>${l.cust || '-'}</td><td style="color:var(--accent); font-weight:bold;">${l.total}</td></tr>`).join('');
    }

    // --- UTILS ---
    function exportFullCSV() {
        let csv = "Barcode,Name,Price,Stock\n";
        inventory.forEach(i => csv += `"${i.code}","${i.name}",${i.price},${i.stock}\n`);
        const b = new Blob([csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'Quantum_Inventory.csv'; a.click();
    }

    function importFullCSV(e) {
        const r = new FileReader();
        r.onload = (f) => {
            const rows = f.target.result.split('\n');
            const n = [];
            for(let i=1; i<rows.length; i++){
                const c = rows[i].split(',');
                if(c.length>=4) n.push({code:c[0].replace(/"/g,''), name:c[1].replace(/"/g,''), price:parseFloat(c[2]), stock:parseFloat(c[3]), img:''});
            }
            if(confirm("Replace inventory with CSV data?")) { inventory = n; renderTable(); }
        };
        r.readAsText(e.target.files[0]);
    }

    function openItemModal() { document.getElementById('itemModal').style.display='flex'; }
    function toggleSettings() { 
        document.getElementById('settingsModal').style.display='flex'; 
        document.getElementById('s-name').value = config.name;
        document.getElementById('s-sub').value = config.sub;
        document.getElementById('s-foot').value = config.foot;
    }
    function saveSettings() { config = {...config, name:document.getElementById('s-name').value, sub:document.getElementById('s-sub').value, foot:document.getElementById('s-foot').value}; localStorage.setItem('apex_v9_cfg', JSON.stringify(config)); closeModals(); renderGrid(); }
    function closeModals() { 
        document.querySelectorAll('.modal').forEach(m => m.style.display='none'); 
        stopScanner('setup-scanner-ui');
    }

    function saveItem() {
        const f = document.getElementById('m-img').files[0];
        const item = { code: document.getElementById('m-code').value, name: document.getElementById('m-name').value, price: parseFloat(document.getElementById('m-price').value), stock: parseInt(document.getElementById('m-stock').value), img: '' };
        const p = () => { inventory.push(item); renderGrid(); closeModals(); localStorage.setItem('apex_v9_inv', JSON.stringify(inventory)); };
        if(f) { const r = new FileReader(); r.onload=(e)=>{item.img=e.target.result; p();}; r.readAsDataURL(f); } else p();
    }

    window.onload = renderGrid;
</script>
</body>
</html>
